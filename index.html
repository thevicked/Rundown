<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flash Game</title>
    <style>
        body { margin:0; background:#000; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; color:#fff; }
        h1 { margin:20px; }
        .container { border:2px solid #444; background:#111; padding:10px; }
    </style>
    <!-- to load the latest Ruffle from CDN -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
    <h1>Run Down</h1>
    
    <div class="container">
        <!-- Ruffle will automatically replace this embed with itself -->
        <embed src="Run Down.swf" width="640" height="480" quality="high" allowfullscreen="false" allowscriptaccess="always" type="application/x-shockwave-flash">
    </div>

    <!-- Optional: basic config (autoplay, no unmute overlay, etc.) -->
    <script>
        window.RufflePlayer.config = {
            "autoplay": "on",           // "on", "off", or "auto"
            "unmuteOverlay": "hidden",  // "hidden" or "visible"
            "warnOnUnsupportedContent": false
        };
    </script>



<!-- On-screen arrows – show only on mobile/small screens -->
<style>
  @media (min-width: 768px) {
    #mobile-controls { display: none !important; }
  }
  #mobile-controls {
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 80px;
    z-index: 9999;
    pointer-events: none; /* so taps go through to game if needed */
  }
  .arrow-btn {
    font-size: 50px;
    width: 90px;
    height: 90px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 2px solid #888;
    border-radius: 20px;
    pointer-events: auto;
    touch-action: manipulation; /* better mobile feel */
  }
</style>

<div id="mobile-controls">
  <button class="arrow-btn" data-key="37">←</button>
  <button class="arrow-btn" data-key="38">↑</button>
  <button class="arrow-btn" data-key="40">↓</button>
  <button class="arrow-btn" data-key="39">→</button>
</div>

<script>
  // Find the Ruffle player element (works with both <ruffle-embed> and <object>/<embed>)
  function getRufflePlayer() {
    return document.querySelector("ruffle-embed") ||
           document.querySelector("object[type='application/x-shockwave-flash']") ||
           document.querySelector("embed[type='application/x-shockwave-flash']") ||
           document.body; // fallback
  }

  // Simulate key press (hold for \~150ms then release)
  function simulateKey(keyCode, down = true) {
    const player = getRufflePlayer();
    if (!player) return;

    player.focus(); // Critical: Ruffle requires focus/pointer interaction

    const eventType = down ? "keydown" : "keyup";
    const event = new KeyboardEvent(eventType, {
      key: getKeyFromCode(keyCode),
      code: getCodeFromKeyCode(keyCode),
      keyCode: keyCode,
      which: keyCode,
      bubbles: true,
      cancelable: true,
      view: window
    });

    player.dispatchEvent(event);
  }

  // Helper: map keyCode to key/code strings (needed for modern events)
  function getKeyFromCode(code) {
    if (code === 37) return "ArrowLeft";
    if (code === 38) return "ArrowUp";
    if (code === 39) return "ArrowRight";
    if (code === 40) return "ArrowDown";
    return "";
  }
  function getCodeFromKeyCode(code) {
    if (code === 37) return "ArrowLeft";
    if (code === 38) return "ArrowUp";
    if (code === 39) return "ArrowRight";
    if (code === 40) return "ArrowDown";
    return "";
  }

  // Attach to buttons (use mousedown/touchstart for press-hold feel)
  document.querySelectorAll('.arrow-btn').forEach(btn => {
    const keyCode = parseInt(btn.dataset.key);

    // Press down
    btn.addEventListener('mousedown', () => simulateKey(keyCode, true));
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault(); // stop scroll/zoom
      simulateKey(keyCode, true);
    });

    // Release
    btn.addEventListener('mouseup', () => simulateKey(keyCode, false));
    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      simulateKey(keyCode, false);
    });

    // Optional: hold repeat (for continuous movement)
    let interval;
    btn.addEventListener('mousedown', () => {
      interval = setInterval(() => simulateKey(keyCode, true), 80);
    });
    btn.addEventListener('mouseup mouseleave touchend', () => {
      clearInterval(interval);
      simulateKey(keyCode, false);
    });
  });
</script>
</body>
</html>
