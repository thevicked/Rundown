<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Flash Game</title>
    <style>
        body { margin:0; background:#000; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; color:#fff; }
        h1 { margin:20px; }
        .container { border:2px solid #444; background:#111; padding:10px; }
    </style>
    <!-- to load the latest Ruffle from CDN -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>


<!-- Mobile arrows (left, up, right only) -->
<style>
  #mobile-arrows {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 70px;
    z-index: 9999;
  }
  .arrow-btn {
    width: 85px;
    height: 85px;
    font-size: 48px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 2px solid #aaa;
    border-radius: 18px;
    touch-action: manipulation;
    user-select: none;
  }
  @media (min-width: 768px) {
    #mobile-arrows { display: none; }
  }
</style>

<div id="mobile-arrows">
  <button class="arrow-btn" data-key="37">←</button>
  <button class="arrow-btn" data-key="38">↑</button>
  <button class="arrow-btn" data-key="39">→</button>
</div>

<script>
  const player = document.querySelector('ruffle-embed') || document.querySelector('object') || document.querySelector('embed') || document.body;

  document.querySelectorAll('.arrow-btn').forEach(btn => {
    const keyCode = parseInt(btn.dataset.key);
    const keyName = {37:'ArrowLeft',38:'ArrowUp',39:'ArrowRight'}[keyCode];

    function send(type) {
      player.focus();
      const evt = new KeyboardEvent(type, {
        key: keyName,
        code: keyName,
        keyCode: keyCode,
        which: keyCode,
        bubbles: true,
        cancelable: true
      });
      player.dispatchEvent(evt);
    }

    // Press start
    btn.addEventListener('touchstart', e => { e.preventDefault(); send('keydown'); });
    btn.addEventListener('mousedown', () => send('keydown'));

    // Release
    btn.addEventListener('touchend', e => { e.preventDefault(); send('keyup'); });
    btn.addEventListener('mouseup', () => send('keyup'));
    btn.addEventListener('mouseleave', () => send('keyup')); // for mouse

    // Optional: repeat for holding (smooth movement in many games)
    let holdInterval;
    const startHold = () => {
      holdInterval = setInterval(() => send('keydown'), 60);
    };
    const stopHold = () => {
      clearInterval(holdInterval);
      send('keyup');
    };

    btn.addEventListener('touchstart', startHold);
    btn.addEventListener('mousedown', startHold);
    btn.addEventListener('touchend touchcancel mouseup mouseleave', stopHold);
  });
</script>


<body>
    <h1>Run Down</h1>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100vh;
    overflow: hidden; /* no scrollbars */
    font-family: sans-serif;
    color: #fff;
  }
  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh; /* full screen height */
    max-width: 100%;
    max-height: 100%;
    margin: 0 auto;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  ruffle-embed, object, embed {
    width: 100% !important;
    height: 100% !important;
    max-width: 100%;
    max-height: 100%;
  }
  /* Optional: hide bars on mobile for more space */
  @media (orientation: portrait) {
    #game-container { padding: 0; }
  }
</style>

<div id="game-container">
  <embed src="Run Down.swf" 
         width="480" height="320"  <!-- your original size, but CSS overrides it -->
         quality="high" 
         allowfullscreen="true" 
         allowscriptaccess="always" 
         type="application/x-shockwave-flash">
</div>
    
    
    <!-- Optional: basic config (autoplay, no unmute overlay, etc.) -->
    <script>
        window.RufflePlayer.config = {
            "autoplay": "on",           // "on", "off", or "auto"
            "unmuteOverlay": "hidden",  // "hidden" or "visible"
            "warnOnUnsupportedContent": false
        };
    </script>


</body>
</html>
